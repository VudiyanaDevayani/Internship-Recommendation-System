<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register | PM INTERNSHIP PORTAL</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            background: linear-gradient(120deg, #e0c3fc 0%, #8ec5fc 100%);
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-card {
            background: rgba(255,255,255,0.97);
            border-radius: 22px;
            box-shadow: 0 8px 32px rgba(40,40,80,0.16);
            padding: 48px 38px 32px 38px;
            min-width: 350px;
            max-width: 420px;
            animation: fadeInDown 1s;
        }
        .register-title {
            font-size: 1.73rem;
            font-weight: bold;
            color: #654ea3;
            margin-bottom: 10px;
            text-align: center;
            letter-spacing: 1px;
        }
        .register-form label {
            display: block;
            color: #2e3963;
            margin-top: 22px;
            margin-bottom: 8px;
            font-size: 1rem;
        }
        .register-form input[type=email],
        .register-form input[type=password] {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            background: #f8fafc;
            font-size: 1rem;
            margin-bottom: 8px;
            transition: border 0.2s;
        }
        .register-form input:focus {
            border-color: #654ea3;
            outline: none;
        }
        .register-form button {
            margin-top: 20px;
            width: 100%;
            padding: 13px 0;
            box-shadow: 0 4px 12px rgba(101,78,163,0.12);
            border-radius: 12px;
            border: none;
            background: linear-gradient(110deg, #654ea3, #eaafc8 90%);
            color: #fff;
            font-weight: bold;
            font-size: 1.09rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background 0.24s;
        }
        .register-form button:hover {
            background: linear-gradient(110deg, #4286f4 20%, #654ea3 100%);
        }
        .login-link {
            margin-top: 18px;
            text-align: center;
            display: block;
            color: #4286f4;
            text-decoration: none;
        }
        .login-link:hover {
            text-decoration: underline;
        }
        @keyframes fadeInDown {
            0% { opacity: 0; transform: translateY(-32px);}
            100% { opacity: 1; transform: translateY(0);}
        }
        ul {
            padding-left: 22px;
            color: #c0392b;
        }
    </style>
</head>
<body>
    <form class="register-card register-form" method="POST">
        <div class="register-title">Register for PM Internship Portal</div>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required/>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required/>

        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" required/>

        <button type="submit">Register</button>
        <a class="login-link" href="/login">Already have an account? Login here.</a>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
            <ul>
                {% for message in messages %}
                <li>{{ message }}</li>
                {% endfor %}
            </ul>
            {% endif %}
        {% endwith %}
    </form>
</body>
</html>
